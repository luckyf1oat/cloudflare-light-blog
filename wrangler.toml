name = "cloudflare-light-blog"
main = "src/worker.js"
compatibility_date = "2024-05-01"
compatibility_flags = ["nodejs_compat"]

# GitHub 绑定部署配置
# 在 Cloudflare Dashboard 创建 Worker 后，连接 GitHub 仓库
# Build settings:
#   - Build command: (留空)
#   - Build output directory: (留空)
#   - Deploy command: npx wrangler deploy

[observability]
enabled = true

[observability.logs]
enabled = true
persist = true
invocation_logs = true